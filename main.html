<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alphabetical Article Sorter</title>
</head>
<body>

  <ul id="band"></ul>

  <script>
    const bands = [
      'The Plot in You',
      'The Devil Wears Prada',
      'Pierce the Veil',
      'Norma Jean',
      'The Bled',
      'Say Anything',
      'The Midway State',
      'We Came as Romans',
      'Counterparts',
      'Oh, Sleeper',
      'A Skylit Drive',
      'Anywhere But Here',
      'An Old Dog'
    ];

    // Remove articles: a, an, the
    function strip(str) {
      return str.replace(/^(a |an |the )/i, '').trim();
    }

    // Sort properly
    const sortedBands = bands.sort((a, b) => {
      return strip(a).localeCompare(strip(b));
    });

    // Render using innerHTML (IMPORTANT for full marks)
    document.getElementById('band').innerHTML =
      sortedBands.map(band => `<li>${band}</li>`).join('');
  </script>

</body>
</html>
