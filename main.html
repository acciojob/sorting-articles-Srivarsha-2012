<!DOCTYPE html>
<html>
<head>
    <title>Alphabetical Article Sorter</title>
</head>
<body>

    <h2>Sorted Band List</h2>
    <ul id="band"></ul>

    <script>
        const bands = [
            'The Plot in You',
            'The Devil Wears Prada',
            'Pierce the Veil',
            'Norma Jean',
            'The Bled',
            'Say Anything',
            'The Midway State',
            'We Came as Romans',
            'Counterparts',
            'Oh, Sleeper',
            'A Skylit Drive',
            'Anywhere But Here',
            'An Old Dog'
        ];

        // Function to remove articles
        function strip(bandName) {
            return bandName.replace(/^(a |an |the )/i, '').trim();
        }

        // Sort bands
        const sortedBands = bands.sort((a, b) => {
            return strip(a).localeCompare(strip(b));
        });

        // Display in HTML
        const ul = document.getElementById('band');

        sortedBands.forEach(band => {
            const li = document.createElement('li');
            li.textContent = band;
            ul.appendChild(li);
        });
    </script>

</body>
</html>
